spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:codeforge_ai_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
    hikari:
      connection-init-sql: SELECT 1
      connection-test-query: SELECT 1
  session:
    store-type: none
  data:
    redis:
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: filesystem:sql/migrations,filesystem:sql/h2-test,classpath:sql/test-migrations
    baseline-on-migrate: false
    clean-disabled: true
  sql:
    init:
      mode: always
      data-locations: classpath:sql/testdata/test-application-seed.sql

server:
  servlet:
    context-path: ""

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true

codeforge:
  release-gates:
    enabled: true
  ai:
    provider: deepseek
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
  generation:
    force-rule-only: false
