# 显式 H2 文件库备用模式：仅 dev-start.ps1 -Profile dev-h2 使用，非 canonical 本地开发数据源
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./.local-data/codeforge-dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;AUTO_SERVER=TRUE
    username: sa
    password:
    hikari:
      connection-init-sql: SELECT 1
      connection-test-query: SELECT 1
  session:
    store-type: none
  data:
    redis:
      repositories:
        enabled: false
  flyway:
    enabled: true
    locations: filesystem:sql/migrations,filesystem:sql/h2-test
    baseline-on-migrate: true
    clean-disabled: true
  sql:
    init:
      mode: always
      data-locations: classpath:sql/testdata/dev-application-seed.sql

server:
  servlet:
    context-path: /api

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true

codeforge:
  ai:
    provider: auto
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
  generation:
    force-rule-only: false
