spring:
  application:
    name: codeforge-ai
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codeforge_ai}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:codeforge_ai_user}
    password: ${DB_PASSWORD:please_change_me}
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  # redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
  flyway:
    enabled: true
    locations: filesystem:sql/migrations,filesystem:sql/mysql-local,filesystem:sql/mysql-baseline
    baseline-on-migrate: true
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
codeforge:
  release-gates:
    enabled: ${CODEFORGE_RELEASE_GATES_ENABLED:false}
  ai:
    provider: ${AI_PROVIDER:auto}
    base-url: ${AI_BASE_URL:}
    model: ${AI_MODEL:}
    max-tokens: 8192
    temperature: 0.2
  generation:
    force-rule-only: ${CODEFORGE_FORCE_RULE_ONLY:false}
  admin:
    metrics:
      stale-after-seconds: 129600
      scheduler-cron: "0 0 * * * ?"
      zone-id: Asia/Shanghai
  security:
    jwt:
      issuer: ${JWT_ISSUER:codeforge-ai}
      secret: ${JWT_SECRET:change-this-jwt-secret-change-this-jwt-secret}
      access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:7200}
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.codeforge.ai.api
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:please_change_me}
      model-name: ${OPENAI_MODEL_NAME:gpt-4.1-mini}
#      strict-json-schema: true
#      response-format: json_object
      max-tokens: 8192
      log-requests: false
      log-responses: false
      max-retries: 3
    streaming-chat-model:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:please_change_me}
      model-name: ${OPENAI_MODEL_NAME:gpt-4.1-mini}
      max-tokens: 8192
      log-requests: false
      log-responses: false
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${REASONING_MODEL_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}
      api-key: ${REASONING_MODEL_API_KEY:${OPENAI_API_KEY:please_change_me}}
      model-name: ${REASONING_MODEL_NAME:gpt-4.1}
      max-tokens: 32768
      temperature: 0.1
      log-requests: false
      log-responses: false
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${ROUTING_MODEL_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}
      api-key: ${ROUTING_MODEL_API_KEY:${OPENAI_API_KEY:please_change_me}}
      model-name: ${ROUTING_MODEL_NAME:gpt-4.1-mini}
      max-tokens: 100
      log-requests: false
      log-responses: false
# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:}
# Pexels 图片搜索配置
pexels:
  api-key: ${PEXELS_API_KEY:}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  image-model: ${DASHSCOPE_IMAGE_MODEL:wan2.2-t2i-flash}
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
