name: Bug report
description: Report a reproducible non-security defect.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not paste real secrets, tokens, cookies, personal data, storage paths, or complete system prompts. Use the private vulnerability reporting link for security issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.0.1
